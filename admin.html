<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel – Aahvanam Reservations</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: #1A0A00;
    min-height: 100vh;
    padding: 40px;
  }
  .login-box, .admin-box {
    background: white;
    border-radius: 16px;
    padding: 40px;
  }
  .login-box {
    max-width: 400px;
    margin: 100px auto;
    text-align: center;
  }
  h1 { color: #5C0E0E; margin-bottom: 20px; }
  h1 span { color: #C9953A; }
  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
  }
  button {
    background: #8B1A1A;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin: 5px;
  }
  button:hover { background: #5C0E0E; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
    gap: 15px;
  }
  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: #f5f5f5;
    padding: 20px 30px;
    border-radius: 12px;
    text-align: center;
    flex: 1;
    min-width: 150px;
  }
  .stat-number {
    font-size: 32px;
    font-weight: bold;
    color: #8B1A1A;
  }
  .stat-label {
    font-size: 12px;
    color: #666;
    margin-top: 5px;
    text-transform: uppercase;
  }
  .filter-bar {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
    flex-wrap: wrap;
    background: #f9f9f9;
    padding: 20px;
    border-radius: 12px;
    align-items: flex-end;
  }
  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .filter-group label {
    font-size: 11px;
    text-transform: uppercase;
    color: #666;
    font-weight: bold;
  }
  .filter-bar input, .filter-bar select {
    width: auto;
    min-width: 160px;
    margin: 0;
    padding: 10px 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
  }
  .refresh-btn {
    background: #C9953A;
    color: #1A0A00;
  }
  .table-wrapper {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid #eee;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
  }
  th {
    background: #5C0E0E;
    color: white;
    padding: 14px 12px;
    text-align: left;
    font-size: 13px;
  }
  td {
    padding: 12px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }
  tr:hover {
    background: #f9f9f9;
  }
  .delete-btn {
    background: #c62828;
    padding: 5px 12px;
    font-size: 12px;
  }
  .logout-btn {
    background: #C9953A;
    color: #1A0A00;
  }
  .back-link {
    color: #C9953A;
    text-decoration: none;
    margin-left: 15px;
  }
  .error {
    color: #c62828;
    margin-top: 10px;
  }
  .empty-state {
    text-align: center;
    padding: 60px;
    color: #999;
    font-style: italic;
  }
  @media (max-width: 768px) {
    body { padding: 20px; }
    td, th { font-size: 11px; padding: 8px 6px; }
    .filter-bar { flex-direction: column; }
    .filter-bar input, .filter-bar select { width: 100%; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
  const ADMIN_PASSWORD = "aahvanam2025";
  let allReservations = [];
  
  function getReservations() {
    const stored = localStorage.getItem('aahvanam_reservations');
    return stored ? JSON.parse(stored) : [];
  }
  
  function saveReservations(reservations) {
    localStorage.setItem('aahvanam_reservations', JSON.stringify(reservations));
  }
  
  function deleteReservation(id) {
    if (confirm('Are you sure you want to delete this reservation?')) {
      const reservations = getReservations();
      const filtered = reservations.filter(r => r.id !== id);
      saveReservations(filtered);
      loadAdminPanel();
    }
  }
  
  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const parts = dateStr.split('-');
    return `${parts[2]}/${parts[1]}/${parts[0]}`;
  }
  
  function formatDateTime(isoString) {
    if (!isoString) return '—';
    const d = new Date(isoString);
    return d.toLocaleString();
  }
  
  function showLogin() {
    document.getElementById('app').innerHTML = `
      <div class="login-box">
        <h1>🔐 <span>Admin Access</span></h1>
        <p style="color: #666; margin-bottom: 20px;">Hotel Aahvanam Reservations</p>
        <input type="password" id="adminPassword" placeholder="Enter password" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">Login →</button>
        <div id="loginError" class="error"></div>
        <p style="margin-top: 30px;"><a href="index.html" class="back-link">← Back to Main Website</a></p>
      </div>
    `;
  }
  
  window.login = function() {
    const pwd = document.getElementById('adminPassword').value;
    if (pwd === ADMIN_PASSWORD) {
      loadAdminPanel();
    } else {
      document.getElementById('loginError').innerHTML = '❌ Incorrect password. Access denied.';
    }
  };
  
  function renderAdminPanel() {
    const filterDate = document.getElementById('filterDate')?.value || '';
    const filterFloor = document.getElementById('filterFloor')?.value || 'all';
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
    
    let filtered = [...allReservations];
    
    if (filterDate) {
      filtered = filtered.filter(r => r.date === filterDate);
    }
    if (filterFloor && filterFloor !== 'all') {
      filtered = filtered.filter(r => r.floor === filterFloor);
    }
    if (searchTerm) {
      filtered = filtered.filter(r => 
        (r.name && r.name.toLowerCase().includes(searchTerm)) || 
        (r.phone && r.phone.includes(searchTerm))
      );
    }
    
    const todayStr = new Date().toISOString().split('T')[0];
    const stats = {
      total: allReservations.length,
      today: allReservations.filter(r => r.date === todayStr).length,
      acPremium: allReservations.filter(r => r.floor === 'Third Floor AC (Premium)').length
    };
    
    document.getElementById('statsBar').innerHTML = `
      <div class="stat-card"><div class="stat-number">${stats.total}</div><div class="stat-label">Total Reservations</div></div>
      <div class="stat-card"><div class="stat-number">${stats.today}</div><div class="stat-label">Bookings Today</div></div>
      <div class="stat-card"><div class="stat-number">${stats.acPremium}</div><div class="stat-label">3rd Floor AC</div></div>
    `;
    
    const tbody = document.getElementById('tableBody');
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9" class="empty-state">📭 No reservations found. Customers can book via reservation.html!</td></tr>`;
      return;
    }
    
    tbody.innerHTML = filtered.map(res => `
      <tr>
        <td>${res.id || '—'}</td>
        <td><strong>${escapeHtml(res.name)}</strong></td>
        <td>${escapeHtml(res.phone)}</td>
        <td>${formatDate(res.date)}</td>
        <td>${res.time || '—'}</td>
        <td>${res.guests || '—'}</td>
        <td><span style="background:#E8F5E9; padding:4px 10px; border-radius:20px; font-size:12px;">${escapeHtml(res.floor || '—')}</span></td>
        <td style="max-width: 200px; white-space: normal;">${escapeHtml(res.requests?.slice(0, 50) || '—')}</td>
        <td>${formatDateTime(res.created_at)}</td>
        <td><button class="delete-btn" onclick="deleteReservation(${res.id})">🗑️ Delete</button></td>
      </tr>
    `).join('');
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  function loadAdminPanel() {
    allReservations = getReservations();
    
    document.getElementById('app').innerHTML = `
      <div class="admin-box">
        <div class="header">
          <h1>📋 <span>Hotel Aahvanam</span> Reservations</h1>
          <div>
            <button onclick="logout()" class="logout-btn">🚪 Logout</button>
            <a href="index.html" class="back-link">← Main Site</a>
          </div>
        </div>
        
        <div id="statsBar" class="stats"></div>
        
        <div class="filter-bar">
          <div class="filter-group">
            <label>📅 Filter by Date</label>
            <input type="date" id="filterDate">
          </div>
          <div class="filter-group">
            <label>📍 Floor</label>
            <select id="filterFloor">
              <option value="all">All Floors</option>
              <option value="Ground Floor (Street Style)">Ground Floor (Street Style)</option>
              <option value="Third Floor AC (Premium)">Third Floor AC (Premium)</option>
            </select>
          </div>
          <div class="filter-group">
            <label>🔍 Search</label>
            <input type="text" id="searchInput" placeholder="Name or phone">
          </div>
          <button class="refresh-btn" onclick="refreshData()">⟳ Refresh</button>
        </div>
        
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>ID</th><th>Name</th><th>Phone</th><th>Date</th><th>Time</th><th>Guests</th><th>Floor</th><th>Requests</th><th>Booked On</th><th>Action</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    `;
    
    // Set today as default filter
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('filterDate').value = today;
    
    // Add event listeners
    document.getElementById('filterDate').addEventListener('change', () => renderAdminPanel());
    document.getElementById('filterFloor').addEventListener('change', () => renderAdminPanel());
    document.getElementById('searchInput').addEventListener('input', () => renderAdminPanel());
    
    renderAdminPanel();
  }
  
  window.refreshData = function() {
    allReservations = getReservations();
    renderAdminPanel();
  };
  
  window.logout = function() {
    showLogin();
  };
  
  window.deleteReservation = deleteReservation;
  
  showLogin();
</script>
</body>
</html>
