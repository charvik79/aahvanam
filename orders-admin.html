<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel – Hotel Aahvanam Orders</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #1A0A00; padding: 30px; }
  .container { max-width: 1400px; margin: 0 auto; }
  .login-box, .admin-box { background: white; border-radius: 16px; padding: 30px; }
  .login-box { max-width: 400px; margin: 100px auto; text-align: center; }
  h1 { color: #5C0E0E; margin-bottom: 20px; }
  h1 span { color: #C9953A; }
  input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
  button { background: #8B1A1A; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
  .stats { display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
  .stat-card { background: #f5f5f5; padding: 15px 25px; border-radius: 12px; text-align: center; }
  .stat-number { font-size: 28px; font-weight: bold; color: #8B1A1A; }
  .filter-bar { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; background: #f9f9f9; padding: 15px; border-radius: 12px; }
  .filter-bar input, .filter-bar select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; min-width: 150px; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
  th { background: #5C0E0E; color: white; padding: 12px; text-align: left; font-size: 12px; }
  td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
  tr:hover { background: #f9f9f9; }
  .status-confirmed { background: #E8F5E9; color: #2e7d32; padding: 4px 8px; border-radius: 20px; font-size: 11px; display: inline-block; }
  .delete-btn { background: #c62828; color: white; padding: 5px 10px; font-size: 11px; border: none; border-radius: 6px; cursor: pointer; }
  .logout-btn { background: #C9953A; color: #1A0A00; }
  .empty-state { text-align: center; padding: 40px; color: #999; }
  @media (max-width: 768px) { td, th { font-size: 10px; padding: 6px; } body { padding: 15px; } }
</style>
</head>
<body>
<div id="app"></div>

<script>
  const ADMIN_PASSWORD = "aahvanam2025";
  let allOrders = [];
  
  function getOrders() {
    const stored = localStorage.getItem('aahvanam_orders');
    return stored ? JSON.parse(stored) : [];
  }
  
  function saveOrders(orders) {
    localStorage.setItem('aahvanam_orders', JSON.stringify(orders));
  }
  
  function deleteOrder(id) {
    if (confirm('Delete this order?')) {
      const orders = getOrders();
      const filtered = orders.filter(o => o.id !== id);
      saveOrders(filtered);
      loadAdminPanel();
    }
  }
  
  function formatDate(isoString) {
    if (!isoString) return '—';
    const d = new Date(isoString);
    return d.toLocaleString();
  }
  
  function showLogin() {
    document.getElementById('app').innerHTML = `
      <div class="login-box">
        <h1>🔐 <span>Admin Login</span></h1>
        <p>Hotel Aahvanam - Orders Management</p>
        <input type="password" id="password" placeholder="Enter password" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">Login →</button>
        <div id="errorMsg" style="color:red; margin-top:10px;"></div>
        <p style="margin-top: 20px;"><a href="index.html" style="color:#C9953A;">← Back to Website</a></p>
      </div>
    `;
  }
  
  window.login = function() {
    const pwd = document.getElementById('password').value;
    if (pwd === ADMIN_PASSWORD) {
      loadAdminPanel();
    } else {
      document.getElementById('errorMsg').innerHTML = 'Wrong password!';
    }
  };
  
  function loadAdminPanel() {
    allOrders = getOrders();
    
    document.getElementById('app').innerHTML = `
      <div class="admin-box">
        <div class="header">
          <h1>📦 <span>Hotel Aahvanam</span> Orders</h1>
          <div>
            <button onclick="logout()" class="logout-btn">🚪 Logout</button>
            <a href="index.html" style="margin-left:15px; color:#C9953A;">← Main Site</a>
          </div>
        </div>
        
        <div class="stats">
          <div class="stat-card"><div class="stat-number">${allOrders.length}</div><div>Total Orders</div></div>
          <div class="stat-card"><div class="stat-number">${allOrders.filter(o => o.status === 'confirmed').length}</div><div>Confirmed Orders</div></div>
        </div>
        
        <div class="filter-bar">
          <input type="date" id="filterDate" placeholder="Filter by date">
          <input type="text" id="searchInput" placeholder="Search name/phone">
          <button onclick="refreshData()">⟳ Refresh</button>
        </div>
        
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr><th>ID</th><th>Customer</th><th>Phone</th><th>Date/Time</th><th>Items</th><th>Total</th><th>Payment</th><th>Address</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    `;
    
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('filterDate').value = today;
    
    document.getElementById('filterDate').addEventListener('change', () => renderTable());
    document.getElementById('searchInput').addEventListener('input', () => renderTable());
    
    renderTable();
  }
  
  function renderTable() {
    const filterDate = document.getElementById('filterDate')?.value || '';
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
    
    let filtered = [...allOrders];
    
    if (filterDate) {
      filtered = filtered.filter(o => o.orderTime && o.orderTime.startsWith(filterDate));
    }
    if (searchTerm) {
      filtered = filtered.filter(o => 
        (o.custName && o.custName.toLowerCase().includes(searchTerm)) ||
        (o.custPhone && o.custPhone.includes(searchTerm))
      );
    }
    
    const tbody = document.getElementById('tableBody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty-state">📭 No orders found</td></tr>';
      return;
    }
    
    tbody.innerHTML = filtered.map(o => {
      let itemsSummary = '';
      if (o.itemsArray) {
        const items = Object.values(o.itemsArray);
        itemsSummary = items.slice(0, 2).map(i => `${i.name} x${i.qty}`).join(', ');
        if (items.length > 2) itemsSummary += '...';
      }
      
      return `
        <tr>
          <td><strong>#${o.id}</strong></td>
          <td>${escapeHtml(o.custName)}</td>
          <td>${escapeHtml(o.custPhone)}</td>
          <td>${formatDate(o.orderTime)}</td>
          <td style="max-width:180px;">${escapeHtml(itemsSummary)}</td>
          <td><strong>₹${o.total}</strong></td>
          <td>${o.paymentMethod || '—'}</td>
          <td style="max-width:150px;">${escapeHtml((o.address || '').substring(0, 40))}</td>
          <td><span class="status-confirmed">✓ Confirmed</span></td>
          <td><button class="delete-btn" onclick="deleteOrder(${o.id})">🗑️ Delete</button></td>
        </tr>
      `;
    }).join('');
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }
  
  window.refreshData = function() {
    allOrders = getOrders();
    renderTable();
  };
  
  window.logout = function() {
    showLogin();
  };
  
  window.deleteOrder = deleteOrder;
  
  showLogin();
</script>
</body>
</html>
