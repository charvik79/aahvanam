<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal - Aahvanam Hotel</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0a00 0%, #3a1f0a 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 40px 20px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 50px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    color: #E8B96A;
    margin-bottom: 10px;
  }

  .header p {
    color: rgba(245,237,216,0.6);
    font-size: 1rem;
  }

  .admin-info {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 15px 20px;
    margin-bottom: 40px;
    text-align: center;
    border: 1px solid rgba(201,149,58,0.3);
  }

  .admin-info span {
    color: #E8B96A;
    font-weight: bold;
  }

  .button-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    margin-bottom: 40px;
  }

  .admin-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 40px 30px;
    text-align: center;
    border: 1px solid rgba(201,149,58,0.3);
    transition: all 0.3s;
    cursor: pointer;
    text-decoration: none;
    display: block;
  }

  .admin-card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.15);
    border-color: #E8B96A;
  }

  .card-icon {
    font-size: 4rem;
    margin-bottom: 20px;
  }

  .admin-card h2 {
    color: #E8B96A;
    margin-bottom: 10px;
    font-size: 1.8rem;
  }

  .admin-card p {
    color: rgba(245,237,216,0.6);
    font-size: 0.9rem;
  }

  .logout-btn {
    display: block;
    text-align: center;
    margin-top: 30px;
  }

  .logout-btn button {
    background: #8B1A1A;
    color: white;
    padding: 12px 30px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.3s;
  }

  .logout-btn button:hover {
    background: #5C0E0E;
    transform: translateY(-2px);
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: rgba(245,237,216,0.5);
    text-decoration: none;
  }

  .back-link:hover {
    color: #E8B96A;
  }

  @media (max-width: 600px) {
    .button-grid {
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .header h1 { font-size: 1.8rem; }
    .admin-card { padding: 30px 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>👑 Admin Portal</h1>
    <p>Welcome to the Aahvanam Hotel Admin Dashboard</p>
  </div>

  <div class="admin-info">
    🔐 Logged in as: <span>Administrator</span> | You have full access to manage reservations and orders
  </div>

  <div class="button-grid">
    <a href="admin.html" class="admin-card">
      <div class="card-icon">📋</div>
      <h2>Reservations</h2>
      <p>View, search, and manage all table bookings</p>
    </a>

    <a href="orders-admin.html" class="admin-card">
      <div class="card-icon">🛒</div>
      <h2>Orders</h2>
      <p>View and manage all online orders</p>
    </a>
  </div>

  <div class="logout-btn">
    <button onclick="logout()">🚪 Logout</button>
  </div>
  <a href="index.html" class="back-link">← Back to Website</a>
</div>

<script>
function logout() {
  localStorage.removeItem('adminLoggedIn');
  window.location.href = 'index.html';
}

// Check if admin is logged in
if (localStorage.getItem('adminLoggedIn') !== 'true') {
  window.location.href = 'admin-login.html';
}
</script>
</body>
</html>
